name: Release

on:
  push:
    branches:
      - '1.*'

permissions:
  contents: read
  statuses: write

jobs:
  release:
    uses: neoforged/actions/.github/workflows/gradle-publish.yml@main
    with:
      java: 17
      pre_gradle_tasks: setup
      gradle_tasks: publish
      # Unlike on 1.20.2+, 1.20.1 still uses the 'old' versioning scheme
      # version_labels: -beta, -stable
